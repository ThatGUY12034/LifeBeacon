{% extends "base.html" %}
{% block title %}Doctor Panel — LifeBeacon{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Doctor Panel</div><div class="page-sub">Search and access patient profiles</div></div>
  <span class="badge badge-blue">🩺 Verified Doctor</span>
</div>
<div class="card card-accent mb-3">
  <div class="card-title"><div class="icon">🔍</div> Search Patients</div>
  <input type="text" id="searchInput" class="form-control" placeholder="Type patient name or email..." oninput="searchPatients()">
  <div id="searchResults" style="margin-top:1rem;"></div>
</div>
<script>
let timeout;
function searchPatients(){
  clearTimeout(timeout);
  timeout=setTimeout(async()=>{
    const q=document.getElementById('searchInput').value.trim();
    if(q.length<2){document.getElementById('searchResults').innerHTML='';return;}
    const res=await fetch('/doctor/search?q='+encodeURIComponent(q));
    const patients=await res.json();
    if(!patients.length){document.getElementById('searchResults').innerHTML='<p class="text-muted text-sm">No patients found.</p>';return;}
    let html='<div style="display:flex;flex-direction:column;gap:0.6rem;">';
    patients.forEach(p=>{
      html+=`<a href="/doctor/patient/${p.id}" style="text-decoration:none;display:flex;align-items:center;gap:1rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);">
        <div style="width:36px;height:36px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">${p.name.charAt(0).toUpperCase()}</div>
        <div style="flex:1;"><div style="font-weight:600;">${p.name}</div><div style="font-size:0.82rem;color:var(--text-muted);">${p.email}</div></div>
        ${p.blood_group?`<span class="badge badge-red">${p.blood_group}</span>`:''}
        <span style="color:var(--text-muted);">→</span></a>`;
    });
    html+='</div>';
    document.getElementById('searchResults').innerHTML=html;
  },300);
}
</script>
{% endblock %}
