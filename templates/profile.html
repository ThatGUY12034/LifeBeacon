{% extends "base.html" %}
{% block title %}Medical Profile — LifeBeacon{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">Medical Profile</div><div class="page-sub">This info appears in your emergency QR view</div></div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">← Back</a>
</div>
<form method="POST">
  <div class="grid-2 mb-3">
    <div class="card">
      <div class="card-title"><div class="icon">👤</div> Personal Info</div>
      <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" name="dob" class="form-control" value="{{ user.dob or '' }}"></div>
      <div class="form-group"><label class="form-label">Blood Group</label>
        <select name="blood_group" class="form-control">
          <option value="">Select Blood Group</option>
          {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
          <option value="{{ bg }}" {% if user.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><div class="icon">🚨</div> Emergency Contact</div>
      <div class="form-group"><label class="form-label">Contact Name</label><input type="text" name="emergency_contact_name" class="form-control" value="{{ user.emergency_contact_name or '' }}" placeholder="Jane Doe"></div>
      <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" name="emergency_contact_phone" class="form-control" value="{{ user.emergency_contact_phone or '' }}" placeholder="+91 98765 43210"></div>
      <div class="form-group"><label class="form-label">Relationship</label><input type="text" name="emergency_contact_relation" class="form-control" value="{{ user.emergency_contact_relation or '' }}" placeholder="Spouse / Parent"></div>
    </div>
  </div>
  <div class="card mb-3">
    <div class="card-title"><div class="icon">🏥</div> Medical History</div>
    <div class="grid-3">
      <div class="form-group"><label class="form-label">Allergies</label><textarea name="allergies" class="form-control" placeholder="e.g. Penicillin, Shellfish">{{ user.allergies or '' }}</textarea></div>
      <div class="form-group"><label class="form-label">Chronic Conditions</label><textarea name="chronic_conditions" class="form-control" placeholder="e.g. Type 2 Diabetes, Hypertension">{{ user.chronic_conditions or '' }}</textarea></div>
      <div class="form-group"><label class="form-label">Current Medications</label><textarea name="medications" class="form-control" placeholder="e.g. Metformin 500mg">{{ user.medications or '' }}</textarea></div>
    </div>
  </div>
  <div class="flex gap-1">
    <button type="submit" class="btn btn-primary btn-lg">💾 Save Profile</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-ghost btn-lg">Cancel</a>
  </div>
</form>
{% endblock %}
