{% extends "base.html" %}
{% block title %}Sign In — LifeBeacon{% endblock %}
{% block content %}
<div style="max-width:440px;margin:4rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="width:52px;height:52px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 1rem;">❤</div>
    <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-0.03em;">Welcome Back</h1>
    <p class="text-muted mt-1">Sign in to your LifeBeacon account</p>
  </div>
  <div class="card card-accent">
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Sign In →</button>
    </form>
    <p class="text-muted text-sm" style="text-align:center;margin-top:1.25rem;">
      Don't have an account? <a href="/register" style="color:var(--red);text-decoration:none;">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
